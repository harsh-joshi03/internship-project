<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Antigravity Auth</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Premium Styles -->
    <link rel="stylesheet" href="auth.css">
</head>
<body>

    <!-- Dynamic background blobs -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Registration Card -->
    <div class="auth-card my-4">
        <div class="text-center">
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Join us to access all premium features</p>
        </div>
        
        <!-- Error Alert Container -->
        <div id="errorAlert" class="alert alert-danger" style="display: none; border-radius: 12px; font-size: 0.9rem; background: rgba(220, 53, 69, 0.1); border: 1px solid rgba(220, 53, 69, 0.2); color: #ea868f;"></div>

        <form id="registerForm" class="needs-validation" novalidate>
            <!-- Full Name Input -->
            <div class="form-group-custom">
                <label for="fullName" class="input-label-custom">Full Name</label>
                <div class="input-icon-wrapper">
                    <input type="text" id="fullName" class="form-control-custom" placeholder="John Doe" required autocomplete="name">
                    <i class="bi bi-person field-icon"></i>
                </div>
            </div>

            <!-- Email Input -->
            <div class="form-group-custom">
                <label for="email" class="input-label-custom">Email Address</label>
                <div class="input-icon-wrapper">
                    <input type="email" id="email" class="form-control-custom" placeholder="name@example.com" required autocomplete="username">
                    <i class="bi bi-envelope field-icon"></i>
                </div>
            </div>

            <!-- Password Input -->
            <div class="form-group-custom">
                <label for="password" class="input-label-custom">Password</label>
                <div class="input-icon-wrapper">
                    <input type="password" id="password" class="form-control-custom" placeholder="••••••••" required autocomplete="new-password" minlength="6">
                    <i class="bi bi-lock field-icon"></i>
                    <i class="bi bi-eye password-toggle" data-target="password"></i>
                </div>
            </div>

            <!-- Confirm Password Input -->
            <div class="form-group-custom">
                <label for="confirmPassword" class="input-label-custom">Confirm Password</label>
                <div class="input-icon-wrapper">
                    <input type="password" id="confirmPassword" class="form-control-custom" placeholder="••••••••" required autocomplete="new-password" minlength="6">
                    <i class="bi bi-lock-fill field-icon"></i>
                    <i class="bi bi-eye password-toggle" data-target="confirmPassword"></i>
                </div>
                <div class="invalid-feedback text-danger mt-1" style="font-size: 0.8rem;" id="passwordError">
                    Passwords do not match.
                </div>
            </div>

            <!-- Terms Agreement -->
            <div class="auth-options my-3">
                <label class="checkbox-custom">
                    <input type="checkbox" id="terms" required>
                    <span>I agree to the <a href="#" class="auth-link">Terms & Conditions</a></span>
                </label>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-gradient">Register</button>
        </form>

        <!-- Footer Redirection Link -->
        <div class="auth-footer">
            Already have an account? <a href="login.html" class="auth-link">Login here</a>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Page Logic -->
    <script>
        // Toggle password visibility for both password inputs
        document.querySelectorAll('.password-toggle').forEach(toggle => {
            toggle.addEventListener('click', function () {
                const targetId = this.getAttribute('data-target');
                const passwordField = document.getElementById(targetId);
                const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordField.setAttribute('type', type);
                
                // Toggle icons
                this.classList.toggle('bi-eye');
                this.classList.toggle('bi-eye-slash');
            });
        });

        // Form Validation and alert trigger
        const form = document.querySelector('#registerForm');
        const password = document.querySelector('#password');
        const confirmPassword = document.querySelector('#confirmPassword');
        const passwordError = document.querySelector('#passwordError');
        const errorAlert = document.getElementById('errorAlert');

        // Real-time password matching check
        function checkPasswordMatch() {
            if (password.value !== confirmPassword.value) {
                confirmPassword.setCustomValidity("Passwords don't match");
                passwordError.style.display = 'block';
            } else {
                confirmPassword.setCustomValidity("");
                passwordError.style.display = 'none';
            }
        }

        password.addEventListener('input', checkPasswordMatch);
        confirmPassword.addEventListener('input', checkPasswordMatch);

        form.addEventListener('submit', async function (event) {
            event.preventDefault();
            errorAlert.style.display = 'none';
            
            // Check password match before validation check
            checkPasswordMatch();

            if (!form.checkValidity()) {
                event.stopPropagation();
                form.classList.add('was-validated');
                
                // Trigger shake effect for better interactivity
                const card = document.querySelector('.auth-card');
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 400);
            } else {
                const name = document.getElementById('fullName').value;
                const email = document.getElementById('email').value;
                const passwordVal = password.value;

                try {
                    const response = await fetch('/api/users', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ name, email, password: passwordVal })
                    });

                    const data = await response.json();

                    if (response.ok && data.success) {
                        alert("Account created successfully! Please log in.");
                        window.location.href = "login.html";
                    } else {
                        errorAlert.textContent = data.message || 'Registration failed.';
                        errorAlert.style.display = 'block';

                        const card = document.querySelector('.auth-card');
                        card.classList.add('shake');
                        setTimeout(() => card.classList.remove('shake'), 400);
                    }
                } catch (error) {
                    console.error('Error registering:', error);
                    errorAlert.textContent = 'Server connection failed. Please try again later.';
                    errorAlert.style.display = 'block';
                }
            }
        });
    </script>
</body>
</html>
